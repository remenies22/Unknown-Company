<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DROE | Luxury Experience</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            background-color: #ffffff; 
            color: #1a1a1a; 
            text-align: center; 
        }
        
        /* Hero Section - Elegance */
        .hero { 
            padding: 150px 20px; 
            background-color: #fdfdfd; 
            border-bottom: 1px solid #eee;
        }
        .hero h1 { 
            font-family: 'Playfair Display', serif;
            font-size: 4rem; 
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 5px;
        }
        .hero p { 
            font-size: 1.1rem; 
            color: #666; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
        }

        /* Menu Grid - Minimalist */
        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 40px; 
            padding: 80px 10%; 
        }
        .menu-item { 
            padding: 20px; 
            transition: transform 0.5s ease; 
        }
        .menu-item:hover { transform: translateY(-10px); }
        
        .menu-item img { 
            width: 100%; 
            height: 400px; 
            object-fit: cover; 
            filter: grayscale(20%);
        }
        .menu-item h3 { 
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin: 20px 0 10px; 
        }
        .menu-item p { 
            font-size: 0.9rem; 
            color: #999; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1>DROE</h1>
        <p>Exceptional Taste</p>
    </header>

    <main class="menu-grid">
        <div class="menu-item">
            <img src="cat.jpg" alt="Luxury Dish">
            <h3>Signature Selection</h3>
            <p>Refined experience</p>
        </div>
        <div class="menu-item">
            <img src="cat.jpg" alt="Artisan Dish">
            <h3>Artisan Creation</h3>
            <p>Exquisite craft</p>
        </div>
    </main>

</body>
</html>
